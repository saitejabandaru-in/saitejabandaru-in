<svg xmlns="http://www.w3.org/2000/svg" width="135" height="100" viewBox="0 0 135 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2015" />
      <stop offset="100%" stop-color="#0b0e07" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="131" height="96" rx="10" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Accent Top Border -->
  <path d="M 12 2 L 123 2" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.8" />

  <!-- Logo Icon -->
  <g transform="translate(67.5, 40)">
    <!-- ORCID iD Icon -->
        <circle cx="0" cy="0" r="13" fill="#a3e635" />
        <text x="0" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">iD</text>
        
  </g>

  <!-- Label -->
  <text x="67.5" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">ORCID</text>
</svg>
