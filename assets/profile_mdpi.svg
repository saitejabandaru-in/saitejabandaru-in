<svg xmlns="http://www.w3.org/2000/svg" width="135" height="100" viewBox="0 0 135 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2018" />
      <stop offset="100%" stop-color="#070e0b" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="131" height="96" rx="10" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Accent Top Border -->
  <path d="M 12 2 L 123 2" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.8" />

  <!-- Logo Icon -->
  <g transform="translate(67.5, 40)">
    <!-- Leaf Icon -->
        <path d="M 0 -12 C 8 -12, 12 -4, 0 12 C -12 -4, -8 -12, 0 -12 Z" fill="#10b981" />
        <path d="M 0 -12 L 0 12" stroke="#070e0b" stroke-width="1.5" />
        
  </g>

  <!-- Label -->
  <text x="67.5" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">SCIPROFILES</text>
</svg>
