<svg xmlns="http://www.w3.org/2000/svg" width="135" height="100" viewBox="0 0 135 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a10" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="131" height="96" rx="10" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Accent Top Border -->
  <path d="M 12 2 L 123 2" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.8" />

  <!-- Logo Icon -->
  <g transform="translate(67.5, 40)">
    <!-- Mortarboard Icon -->
        <path d="M -16 -4 L 0 -11 L 16 -4 L 0 3 Z" fill="#3b82f6" />
        <path d="M -9 -1 L -9 8 C -9 11, 9 11, 9 8 L 9 -1" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
        <path d="M 9 -1 L 13 6" fill="none" stroke="#3b82f6" stroke-width="1.5" />
        <circle cx="13" cy="7" r="1.5" fill="#3b82f6" />
        
  </g>

  <!-- Label -->
  <text x="67.5" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">SCHOLAR</text>
</svg>
