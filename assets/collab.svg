<svg xmlns="http://www.w3.org/2000/svg" width="300" height="180" viewBox="0 0 300 180">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141d2f" />
      <stop offset="100%" stop-color="#0b101b" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7CAC" />
      <stop offset="100%" stop-color="#1d2c42" />
    </linearGradient>

    <!-- Button Gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background with Shadow -->
  <rect x="5" y="5" width="290" height="170" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2" filter="drop-shadow(0 8px 16px rgba(0,0,0,0.4))" />

  <!-- Accent Top Border Glow -->
  <path d="M 21 5 L 279 5" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.8" />

  <!-- Icon & Header -->
  <g transform="translate(20, 35)">
    <!-- Rocket Icon -->
    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="22">🚀</text>
    <!-- Title -->
    <text x="32" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#f8fafc" letter-spacing="1">COLLABORATION</text>
    <!-- Subtitle / Focus -->
    <text x="32" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#93c5fd" letter-spacing="0.5">FOUNDERS &amp; STARTUPS</text>
  </g>

  <!-- Description Text (Wrapped) -->
  <text x="20" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" line-height="1.4">
    <tspan x="20" dy="0">Need custom AI agents, vector scaling,</tspan>
    <tspan x="20" dy="16">or interpretable modeling pipelines?</tspan>
  </text>

  <!-- Button -->
  <g transform="translate(20, 125)">
    <rect x="0" y="0" width="260" height="34" rx="10" fill="url(#btnGrad)" />
    <text x="130" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Work With Me →</text>
  </g>
</svg>
