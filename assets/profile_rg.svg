<svg xmlns="http://www.w3.org/2000/svg" width="135" height="100" viewBox="0 0 135 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f22" />
      <stop offset="100%" stop-color="#060e10" />
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ccbb" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect x="2" y="2" width="131" height="96" rx="10" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Accent Top Border -->
  <path d="M 12 2 L 123 2" stroke="#00ccbb" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.8" />

  <!-- Logo Icon -->
  <g transform="translate(67.5, 40)">
    <!-- RG Icon -->
        <circle cx="0" cy="0" r="14" fill="none" stroke="#00ccbb" stroke-width="2.5" />
        <path d="M -6 -6 L -6 6 M -6 -2 C -2 -2, 2 -2, 2 -5 C 2 -8, -2 -8, -6 -8" fill="none" stroke="#00ccbb" stroke-width="2.5" stroke-linecap="round" />
        <path d="M -1 0 L 5 7" fill="none" stroke="#00ccbb" stroke-width="2.5" stroke-linecap="round" />
        
  </g>

  <!-- Label -->
  <text x="67.5" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">RESEARCHGATE</text>
</svg>
